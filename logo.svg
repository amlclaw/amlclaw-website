<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background Glow -->
  <circle cx="50" cy="50" r="45" fill="none" class="bg-pulse"/>
  
  <g transform="translate(15, 15) scale(0.7)">
    <!-- Tech Base / Shield -->
    <path d="M50 10 L90 25 L90 60 C90 80 50 100 50 100 C50 100 10 80 10 60 L10 25 Z" fill="rgba(16, 185, 129, 0.1)" stroke="#10b981" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Left Talon -->
    <path d="M40 30 C35 45 25 60 20 75 C30 65 38 70 42 85 C42 65 48 50 49 40" fill="#059669" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Right Talon -->
    <path d="M60 30 C65 45 75 60 80 75 C70 65 62 70 58 85 C58 65 52 50 51 40" fill="#059669" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Center Core / Network Node -->
    <circle cx="50" cy="40" r="8" fill="#10b981" />
    <circle cx="50" cy="40" r="4" fill="#ecfdf5" />
    <path d="M50 48 L50 80" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Cyber Lines -->
    <line x1="25" y1="35" x2="35" y2="35" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-dasharray="2, 4"/>
    <line x1="65" y1="35" x2="75" y2="35" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-dasharray="2, 4"/>
  </g>
</svg>
