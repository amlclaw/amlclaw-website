<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Claw Gradient: Aggressive Cyber Orange/Red -->
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>
    
    <!-- Coin Gradient: Safe Compliance Green -->
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Scan Line Gradient -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(16,185,129,0)" />
      <stop offset="50%" stop-color="rgba(16,185,129,0.5)" />
      <stop offset="100%" stop-color="rgba(16,185,129,0)" />
    </linearGradient>
    
    <clipPath id="coinClip">
      <circle cx="65" cy="45" r="18"/>
    </clipPath>
  </defs>

  <g transform="translate(5, 5) scale(0.9)">
    <!-- THE STABLECOIN (Being monitored/held) -->
    <!-- Glowing outer ring -->
    <circle cx="65" cy="45" r="22" fill="none" stroke="url(#coinGrad)" stroke-width="2" opacity="0.4" stroke-dasharray="4 2"/>
    <!-- Coin Body -->
    <circle cx="65" cy="45" r="18" fill="url(#coinGrad)"/>
    <!-- Inner Dollar/Stablecoin Tech Symbol -->
    <path d="M65 33 L65 57 M60 40 C60 36 70 36 70 42 C70 47 60 48 60 53 C60 59 70 59 70 55" stroke="#ecfdf5" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Cyber Scan Line over the coin -->
    <rect x="43" y="23" width="44" height="44" fill="url(#scanGrad)" opacity="0.5" clip-path="url(#coinClip)">
      <animate attributeName="y" values="23; 67; 23" dur="3s" repeatCount="indefinite" />
    </rect>

    <!-- THE CYBER LOBSTER CLAW -->
    <!-- Lower/Smaller Pincer -->
    <path d="M20 95 C 35 85, 55 80, 75 75 C 85 72, 95 80, 85 85 C 70 90, 50 95, 20 95 Z" fill="url(#clawGrad)"/>
    
    <!-- Upper/Larger Pincer -->
    <path d="M10 95 C 10 60, 25 25, 60 10 C 80 0, 95 15, 90 30 C 85 40, 75 35, 65 30 C 50 20, 35 40, 30 65 C 28 80, 20 95, 10 95 Z" fill="url(#clawGrad)"/>
    
    <!-- Joint/Hinge cyber detailing -->
    <circle cx="25" cy="85" r="12" fill="#be123c"/>
    <circle cx="25" cy="85" r="6" fill="#f43f5e"/>
    <!-- Screws/nodes on hinge -->
    <circle cx="25" cy="77" r="1.5" fill="#fecdd3"/>
    <circle cx="25" cy="93" r="1.5" fill="#fecdd3"/>
    <circle cx="17" cy="85" r="1.5" fill="#fecdd3"/>
    <circle cx="33" cy="85" r="1.5" fill="#fecdd3"/>
    
    <!-- Tech/Cyber line detailing on claw -->
    <path d="M20 65 Q 40 30 65 18" fill="none" stroke="#fda4af" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/>
    <circle cx="65" cy="18" r="2" fill="#fda4af"/>
    <path d="M35 82 Q 55 77 75 75" fill="none" stroke="#fda4af" stroke-width="1.5" opacity="0.6"/>
  </g>
</svg>
